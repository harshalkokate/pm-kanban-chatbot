<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PM App</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 80px auto; padding: 0 24px; color: #032147; }
    h1 { color: #209dd7; }
    #status { margin-top: 24px; padding: 16px; border-radius: 8px; background: #f5f5f5; font-family: monospace; }
  </style>
</head>
<body>
  <h1>PM App</h1>
  <p>Hello from the backend. Docker container is running.</p>
  <div id="status">Calling /api/health...</div>
  <script>
    fetch("/api/health")
      .then(r => r.json())
      .then(data => {
        document.getElementById("status").textContent = "API response: " + JSON.stringify(data);
      })
      .catch(err => {
        document.getElementById("status").textContent = "API error: " + err;
      });
  </script>
</body>
</html>
